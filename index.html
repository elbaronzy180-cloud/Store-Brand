<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA Market — Multi-Vendor Marketplace</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="AURA Market" />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, iMessage, etc.) -->
    <meta property="og:title" content="AURA Market – Multi-Vendor Marketplace" />
    <meta property="og:description" content="Free storefront platform for sellers. Browse products and contact sellers directly – no fees, no middlemen." />
    <meta property="og:image" content="https://store-brand.vercel.app/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:url" content="https://store-brand.vercel.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AURA Market – Multi-Vendor Marketplace" />
    <meta name="twitter:description" content="Free storefront platform for sellers. Browse products and contact sellers directly." />
    <meta name="twitter:image" content="https://store-brand.vercel.app/icon-512.png" />

    <!-- Shared Stylesheet -->
    <link rel="stylesheet" href="style.css" />

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Tailwind (optional) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- ===== Sticky Header ===== -->
    <header id="main-header">
        <div class="container">
            <div id="logo">
                <a href="#" id="home-link">AURA<span>.</span></a>
            </div>

            <nav id="desktop-nav">
                <ul>
                    <li><a href="#" data-section="marketplace">Marketplace</a></li>
                    <li><a href="#" data-section="for-sellers">Become a Seller</a></li>
                    <li><a href="#" data-section="dashboard-login">Seller Login</a></li>
                </ul>
            </nav>

            <button id="mobile-menu-toggle" aria-label="Open menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- ===== Mobile Sidebar ===== -->
    <div id="mobile-sidebar">
        <div id="sidebar-backdrop"></div>
        <div id="sidebar-panel">
            <button id="sidebar-close" aria-label="Close menu">&times;</button>
            <nav>
                <ul id="sidebar-nav">
                    <li><a href="#" data-section="marketplace">Marketplace</a></li>
                    <li><a href="#" data-section="for-sellers">Become a Seller</a></li>
                    <li><a href="#" data-section="dashboard-login">Seller Login</a></li>
                    <li id="sidebar-dashboard-link" style="display:none;"><a href="#" data-section="dashboard">📦 My Dashboard</a></li>
                    <li id="sidebar-store-link" style="display:none;"><a href="#" data-section="view-store">🏪 View My Store</a></li>
                    <li id="sidebar-logout-link" style="display:none;"><a href="#" id="logout-btn">🚪 Log Out</a></li>
                </ul>
                <ul style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                    <li><a href="about.html">About AURA</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- ===== Dynamic Content Area ===== -->
    <main id="app-content">
        <!-- Views injected here by the router -->
    </main>

    <!-- ===== Contact Seller Modal ===== -->
    <div id="contact-modal" class="modal-overlay" style="display:none;">
        <div class="modal-backdrop"></div>
        <div class="modal-contact-content">
            <button class="modal-close-btn">&times;</button>
            <div id="contact-modal-body">
                <!-- Populated by contact.js -->
            </div>
        </div>
    </div>

    <!-- ===================== JavaScript ===================== -->
    <script src="app.js"></script>
    <script src="marketplace.js"></script>
    <script src="sellers.js"></script>
    <script src="store.js"></script>
    <script src="contact.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((reg) => console.log('Service Worker registered'))
                    .catch((err) => console.log('Service Worker failed', err));
            });
        }
    </script>
</body>
</html>
