<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA Market — Multi-Vendor Marketplace</title>
        <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="AURA Market" />
    <meta name="theme-color" content="#000000" />
    <!-- Shared Stylesheet -->
    <link rel="stylesheet" href="style.css" />

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Tailwind (optional, keep if you use utility classes) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- ===== Sticky Header ===== -->
    <header id="main-header">
        <div class="container">
            <!-- Logo -->
            <div id="logo">
                <a href="#" id="home-link">AURA<span>.</span></a>
            </div>

            <!-- Desktop Navigation (will be hidden on mobile, shown on md+) -->
            <nav id="desktop-nav">
                <ul>
                    <li><a href="#" data-section="marketplace">Marketplace</a></li>
                    <li><a href="#" data-section="for-sellers">Become a Seller</a></li>
                    <li><a href="#" data-section="dashboard-login">Seller Login</a></li>
                </ul>
            </nav>

            <!-- Mobile Menu Toggle Button -->
            <button id="mobile-menu-toggle" aria-label="Open menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- ===== Mobile Sidebar (hamburger menu) ===== -->
    <div id="mobile-sidebar">
        <div id="sidebar-backdrop"></div>
        <div id="sidebar-panel">
            <button id="sidebar-close" aria-label="Close menu">&times;</button>
            <nav>
                <ul id="sidebar-nav">
                    <!-- Main app sections -->
                    <li><a href="#" data-section="marketplace">Marketplace</a></li>
                    <li><a href="#" data-section="for-sellers">Become a Seller</a></li>
                    <li><a href="#" data-section="dashboard-login">Seller Login</a></li>
                    <!-- These are shown only when logged in (JS will toggle visibility) -->
                    <li id="sidebar-dashboard-link" style="display:none;"><a href="#" data-section="dashboard">📦 My Dashboard</a></li>
                    <li id="sidebar-store-link" style="display:none;"><a href="#" data-section="view-store">🏪 View My Store</a></li>
                    <li id="sidebar-logout-link" style="display:none;"><a href="#" id="logout-btn">🚪 Log Out</a></li>
                </ul>
                <ul style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                    <li><a href="about.html">About AURA</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- ===== Dynamic Content Area ===== -->
    <main id="app-content">
        <!-- Views will be injected here by the router -->
    </main>

    <!-- ===== Contact Seller Modal ===== -->
    <div id="contact-modal" class="modal-overlay" style="display:none;">
        <div class="modal-backdrop"></div>
        <div class="modal-contact-content">
            <button class="modal-close-btn">&times;</button>
            <div id="contact-modal-body">
                <!-- Populated by contact.js -->
            </div>
        </div>
    </div>

    <!-- ===================== JavaScript ===================== -->
    <!-- Core app logic (router, session, sellers/products helpers) -->
    <script src="app.js"></script>
    <!-- Marketplace module (homepage grid) -->
    <script src="marketplace.js"></script>
    <!-- Seller registration & dashboard -->
    <script src="sellers.js"></script>
    <!-- Public store page -->
    <script src="store.js"></script>
    <!-- Contact modal -->
    <script src="contact.js"></script>

    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then((reg) => console.log('Service Worker registered'))
        .catch((err) => console.log('Service Worker failed', err));
    });
  }
</script>
</body>
</html>
