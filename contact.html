<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — AURA Market</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="icon-192.png">

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Shared Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Page‑specific form styling -->
    <style>
        .contact-form {
            max-width: 640px;
            margin: 0 auto;
        }
        .contact-form input,
        .contact-form textarea {
            width: 100%;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.9rem 1rem;
            color: #f1f5f9;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            font-family: inherit;
        }
        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }
        .contact-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-weight: 500;
        }
        .contact-form .form-group {
            margin-bottom: 1.5rem;
        }
        .submit-btn {
            background-color: #fff;
            color: #000;
            font-weight: 600;
            padding: 0.85rem 2.2rem;
            border: none;
            border-radius: 999px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.25s, transform 0.1s;
            box-shadow: 0 4px 14px rgba(255, 255, 255, 0.1);
        }
        .submit-btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-1px);
        }
        .success-message {
            display: none;
            text-align: center;
            color: #fff;
            font-weight: 600;
            margin-top: 1rem;
        }
        .error-message {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 0.25rem;
            display: none;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-white font-sans antialiased">

    <!-- ===== STICKY HEADER ===== -->
    <header id="main-header">
        <div class="container">
            <div id="logo">
                <a href="index.html">AURA<span>.</span></a>
            </div>
            <nav id="desktop-nav">
                <ul>
                    <li><a href="index.html">Marketplace</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
            <button id="mobile-menu-toggle" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- ===== MOBILE SIDEBAR ===== -->
    <div id="mobile-sidebar">
        <div id="sidebar-backdrop"></div>
        <div id="sidebar-panel">
            <button id="sidebar-close" aria-label="Close menu">&times;</button>
            <nav>
                <ul>
                    <li><a href="index.html">Marketplace</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- ===== PAGE CONTENT ===== -->
    <main id="contact-page">
        <section style="text-align:center; padding:6rem 1.5rem 3rem; background: radial-gradient(circle at 50% 0%, rgba(56,189,248,0.06), transparent 60%);">
            <div class="container">
                <h1>Contact the AURA team</h1>
                <p style="color:#ccc;">We reply within 24 hours. Simple as that.</p>
            </div>
        </section>

        <section class="container" style="padding-bottom:4rem;">
            <div class="contact-form">
                <form id="contactForm" novalidate>
                    <div class="form-group">
                        <label for="name">Full name</label>
                        <input type="text" id="name" name="name" placeholder="Your name" required />
                        <span class="error-message" id="nameError">Please enter your name.</span>
                    </div>
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required />
                        <span class="error-message" id="emailError">Please enter a valid email.</span>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
                        <span class="error-message" id="messageError">Message cannot be empty.</span>
                    </div>
                    <button type="submit" class="submit-btn">Send message</button>
                    <p class="success-message" id="formSuccess">Thank you! Your message has been sent.</p>
                </form>
            </div>
        </section>
    </main>

    <!-- Mobile sidebar toggle + form validation -->
    <script>
        (function() {
            // Mobile sidebar toggle
            const menuToggle = document.getElementById('mobile-menu-toggle');
            const sidebarClose = document.getElementById('sidebar-close');
            const sidebarBackdrop = document.getElementById('sidebar-backdrop');
            const sidebar = document.getElementById('mobile-sidebar');

            function openSidebar() {
                if (sidebar) {
                    sidebar.classList.add('open');
                    document.body.style.overflow = 'hidden';
                }
            }

            function closeSidebar() {
                if (sidebar) {
                    sidebar.classList.remove('open');
                    document.body.style.overflow = '';
                }
            }

            if (menuToggle) menuToggle.addEventListener('click', openSidebar);
            if (sidebarClose) sidebarClose.addEventListener('click', closeSidebar);
            if (sidebarBackdrop) sidebarBackdrop.addEventListener('click', closeSidebar);

            // Form validation
            const form = document.getElementById('contactForm');
            if (form) {
                const nameInput = document.getElementById('name');
                const emailInput = document.getElementById('email');
                const messageInput = document.getElementById('message');
                const nameError = document.getElementById('nameError');
                const emailError = document.getElementById('emailError');
                const messageError = document.getElementById('messageError');
                const successMsg = document.getElementById('formSuccess');

                function hideAllErrors() {
                    nameError.style.display = 'none';
                    emailError.style.display = 'none';
                    messageError.style.display = 'none';
                }

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    hideAllErrors();
                    successMsg.style.display = 'none';

                    let isValid = true;
                    if (nameInput.value.trim() === '') {
                        nameError.style.display = 'block';
                        isValid = false;
                    }
                    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailPattern.test(emailInput.value.trim())) {
                        emailError.style.display = 'block';
                        isValid = false;
                    }
                    if (messageInput.value.trim() === '') {
                        messageError.style.display = 'block';
                        isValid = false;
                    }

                    if (isValid) {
                        form.reset();
                        successMsg.style.display = 'block';
                    }
                });
            }
        })();
    </script>
</body>
</html>
